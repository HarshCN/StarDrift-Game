<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" fill="none">
  <rect width="1200" height="1200" fill="#0a0e1a"/>
  <!-- Stars -->
  <circle cx="200" cy="150" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="450" cy="80" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="850" cy="200" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="1050" cy="100" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="300" cy="900" r="3" fill="#ffffff" opacity="0.7"/>
  <circle cx="950" cy="800" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="100" cy="600" r="4" fill="#ffffff" opacity="0.4"/>
  <circle cx="1100" cy="500" r="3" fill="#ffffff" opacity="0.8"/>
  <!-- Ship body -->
  <path d="M600 250 L480 850 L560 780 L600 820 L640 780 L720 850 Z" fill="url(#shipGrad)"/>
  <!-- Cockpit -->
  <ellipse cx="600" cy="520" rx="45" ry="55" fill="#aaeeff" opacity="0.9"/>
  <!-- Engine glow -->
  <ellipse cx="560" cy="860" rx="30" ry="18" fill="#ff8800" opacity="0.9"/>
  <ellipse cx="640" cy="860" rx="30" ry="18" fill="#ff8800" opacity="0.9"/>
  <ellipse cx="560" cy="870" rx="15" ry="30" fill="#ffcc00"/>
  <ellipse cx="640" cy="870" rx="15" ry="30" fill="#ffcc00"/>
  <!-- Glow -->
  <ellipse cx="600" cy="550" rx="160" ry="200" fill="url(#glowGrad)" opacity="0.3"/>
  <defs>
    <linearGradient id="shipGrad" x1="600" y1="250" x2="600" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#0055aa"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>